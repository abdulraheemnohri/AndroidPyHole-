<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidPyHole Alerts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="dark-mode">
    <div class="container">
        <h1>SYSTEM ALERTS</h1>
        <div class="card">
            <h3>Recent Notifications</h3>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Message</th>
                        <th>Severity</th>
                    </tr>
                </thead>
                <tbody>
                    {% for alert in alerts %}
                        <tr class="severity-{{ alert.severity.lower() }}">
                            <td>{{ alert.timestamp }}</td>
                            <td>{{ alert.type }}</td>
                            <td>{{ alert.message }}</td>
                            <td><strong>{{ alert.severity }}</strong></td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/logs">Logs</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
</body>
</html>
