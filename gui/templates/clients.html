<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidPyHole Clients</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="dark-mode">
    <div class="container">
        <h1>CLIENTS</h1>
        <div class="card">
            <h3>Connected Devices</h3>
            <table>
                <thead>
                    <tr>
                        <th>Client IP</th>
                        <th>Queries</th>
                        <th>Tag/Group</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for client in clients %}
                        <tr>
                            <td>{{ client.client }}</td>
                            <td>{{ client.count }}</td>
                            <td>{{ client.group_name or 'Default' }}</td>
                            <td>
                                <button onclick="toggleBlock('{{ client.client }}')">Block/Unblock</button>
                                <button onclick="changeGroup('{{ client.client }}')">Tag</button>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/logs">Logs</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
    <script>
        async function toggleBlock(client) {
            alert("Toggled blocking for " + client + " (Blueprint mockup)");
        }
        async function changeGroup(client) {
            const newGroup = prompt("Enter tag for " + client + ":");
            if (newGroup) alert("Tagged " + client + " as " + newGroup);
        }
    </script>
</body>
</html>
