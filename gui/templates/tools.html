<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidPyHole Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="dark-mode">
    <div class="container">
        <h1>DIAGNOSTIC TOOLS</h1>
        <div class="card">
            <h3>DNS Operations</h3>
            <button onclick="flushLogs()">Flush Query Logs (Clear Data)</button>
            <button onclick="alert('DNS Server restarted')">Restart DNS Engine</button>
        </div>
        <div class="card">
            <h3>Network Debug</h3>
            <button onclick="location.href='/network'">Scan Local Network</button>
            <button onclick="alert('Cache cleared')">Flush DNS Cache</button>
        </div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
    <script>
        async function flushLogs() {
            if(confirm("Are you sure you want to delete all query logs?")) {
                await fetch('/api/action/flush-logs', { method: 'POST' });
                alert("Logs flushed.");
            }
        }
    </script>
</body>
</html>
