<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidPyHole Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>QUERY LOGS</h1>
        <div class="card">
            <h3>Recent Activity</h3>
            <input type="text" id="log-filter" placeholder="Filter by domain or client..." onkeyup="filterLogs()">
            <table id="logs-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Domain</th>
                        <th>Client</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                        <tr class="{{ 'status-blocked' if log.status == 'BLOCKED' else 'status-allowed' }}">
                            <td>{{ log.timestamp }}</td>
                            <td>{{ log.domain }}</td>
                            <td>{{ log.client }}</td>
                            <td><strong>{{ log.status }}</strong></td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/clients">Clients</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
    <script>
        function filterLogs() {
            const filter = document.getElementById('log-filter').value.toLowerCase();
            const table = document.getElementById('logs-table');
            const trs = table.getElementsByTagName('tr');
            for (let i = 1; i < trs.length; i++) {
                const domain = trs[i].getElementsByTagName('td')[1].textContent.toLowerCase();
                const client = trs[i].getElementsByTagName('td')[2].textContent.toLowerCase();
                if (domain.includes(filter) || client.includes(filter)) {
                    trs[i].style.display = "";
                } else {
                    trs[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
