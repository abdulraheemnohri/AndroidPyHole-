<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidPyHole Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>QUERY LOGS</h1>
        <div class="card">
            <h3>Recent Activity</h3>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Domain</th>
                        <th>Client</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for timestamp, domain, client, status in logs %}
                        <tr class="{{ 'status-blocked' if status == 'BLOCKED' else 'status-allowed' }}">
                            <td>{{ timestamp }}</td>
                            <td>{{ domain }}</td>
                            <td>{{ client }}</td>
                            <td><strong>{{ status }}</strong></td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/clients">Clients</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
</body>
</html>
