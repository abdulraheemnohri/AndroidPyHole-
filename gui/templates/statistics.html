<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndroidPyHole Statistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <div class="container">
        <h1>ADVANCED STATISTICS</h1>

        <div class="card">
            <h3>Query Types</h3>
            <canvas id="typeChart"></canvas>
        </div>

        <div class="card">
            <h3>Top Clients</h3>
            <canvas id="clientChart"></canvas>
        </div>

        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/logs">Logs</a>
            <a href="/settings">Settings</a>
        </div>
    </div>
    <script>
        async function loadStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();

            new Chart(document.getElementById('typeChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Allowed', 'Blocked'],
                    datasets: [{
                        data: [data.total_queries - data.blocked_queries, data.blocked_queries],
                        backgroundColor: ['#78dc77', '#ffb4a9']
                    }]
                },
                options: { plugins: { legend: { labels: { color: 'white' } } } }
            });

            const clientLabels = data.top_clients.map(c => c.client);
            const clientCounts = data.top_clients.map(c => c.count);

            new Chart(document.getElementById('clientChart'), {
                type: 'bar',
                data: {
                    labels: clientLabels,
                    datasets: [{
                        label: 'Queries',
                        data: clientCounts,
                        backgroundColor: '#4caf50'
                    }]
                },
                options: {
                    scales: {
                        y: { ticks: { color: 'white' }, grid: { color: '#353534' } },
                        x: { ticks: { color: 'white' }, grid: { color: '#353534' } }
                    },
                    plugins: { legend: { labels: { color: 'white' } } }
                }
            });
        }
        loadStats();
    </script>
</body>
</html>
