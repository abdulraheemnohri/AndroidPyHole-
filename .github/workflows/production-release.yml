name: PyHoleX Production Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-rust:
    name: Native Core (${{ matrix.target }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        target: [aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
      - name: Build Release
        run: |
          cd rust-dns-engine
          cargo build --release --target ${{ matrix.target }}
      - name: Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.target }}
          path: rust-dns-engine/target/${{ matrix.target }}/release/*.so

  build-android:
    name: Android Multi-ABI APK
    needs: build-rust
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Download Native Cores
        uses: actions/download-artifact@v4
        with:
          path: app/src/main/jniLibs
      - name: Organize jniLibs
        run: |
          cd app/src/main/jniLibs
          mv core-aarch64-linux-android arm64-v8a
          mv core-armv7-linux-androideabi armeabi-v7a
          mv core-x86_64-linux-android x86_64
          mv core-i686-linux-android x86
      - name: Build Release APK
        run: ./gradlew assembleRelease
      - name: Upload Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: pyholex-production-release
          path: app/build/outputs/apk/release/*.apk
